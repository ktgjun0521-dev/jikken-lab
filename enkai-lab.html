<style>
  :root{
    --bg:#12080f;
    --bg2:#1d0f1a;
    --card:#241226;
    --card2:#2d1830;
    --neon-pink:#ff4fa3;
    --neon-yellow:#ffd93b;
    --neon-orange:#ff8c42;
    --neon-cyan:#4fd8ff;
    --text:#fff3e0;
    --muted:#c9a3b8;
    --border:#4a2547;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(255,79,163,.18), transparent 50%),
      radial-gradient(ellipse at 80% -10%, rgba(255,140,66,.15), transparent 50%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    padding-bottom:60px;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 14px;}
  a.back{
    display:inline-block;margin:14px 0 4px;color:var(--neon-cyan);
    text-decoration:none;font-size:.9rem;opacity:.9;
  }
  a.back:hover{text-decoration:underline;}

  /* ===== 提灯 ===== */
  .lanterns{display:flex;justify-content:center;gap:14px;margin-top:6px;user-select:none;}
  .lantern{
    font-size:2rem;
    animation:sway 3s ease-in-out infinite;
    transform-origin:top center;
    filter:drop-shadow(0 0 8px rgba(255,140,66,.8));
  }
  .lantern:nth-child(2){animation-delay:.4s;}
  .lantern:nth-child(3){animation-delay:.8s;}
  .lantern:nth-child(4){animation-delay:1.2s;}
  .lantern:nth-child(5){animation-delay:1.6s;}
  @keyframes sway{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}

  h1.title{
    text-align:center;
    font-size:clamp(1.7rem,7vw,2.4rem);
    margin:10px 0 2px;
    letter-spacing:.05em;
    color:var(--neon-yellow);
    text-shadow:
      0 0 6px rgba(255,217,59,.9),
      0 0 18px rgba(255,140,66,.7),
      0 0 40px rgba(255,79,163,.5);
    animation:flicker 4s infinite;
  }
  @keyframes flicker{
    0%,93%,100%{opacity:1;}
    94%{opacity:.75;}
    96%{opacity:1;}
    98%{opacity:.85;}
  }
  .subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:18px;}

  /* ===== タブ ===== */
  .tabs{display:flex;gap:10px;margin-bottom:16px;}
  .tab-btn{
    flex:1;padding:16px 8px;font-size:1.05rem;font-weight:bold;
    background:var(--card);color:var(--muted);
    border:2px solid var(--border);border-radius:14px;cursor:pointer;
    transition:all .2s;font-family:inherit;
  }
  .tab-btn.active{
    color:#1a0a14;
    background:linear-gradient(135deg,var(--neon-yellow),var(--neon-orange));
    border-color:var(--neon-yellow);
    box-shadow:0 0 16px rgba(255,180,60,.5);
  }
  .tab-btn:active{transform:scale(.97);}
  .panel{display:none;}
  .panel.active{display:block;animation:fadein .25s;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* ===== カード / フォーム ===== */
  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:16px;padding:18px 16px;margin-bottom:16px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:.85rem;color:var(--neon-cyan);
    margin-bottom:6px;font-weight:bold;letter-spacing:.05em;
  }
  select,input[type=text]{
    width:100%;padding:14px 12px;font-size:1.05rem;
    background:var(--bg2);color:var(--text);
    border:2px solid var(--border);border-radius:12px;
    font-family:inherit;appearance:none;
  }
  select:focus,input[type=text]:focus{outline:none;border-color:var(--neon-pink);}
  .seg{display:flex;flex-wrap:wrap;gap:8px;}
  .seg button{
    flex:1 1 auto;min-width:90px;padding:13px 8px;font-size:.95rem;
    background:var(--bg2);color:var(--muted);
    border:2px solid var(--border);border-radius:12px;cursor:pointer;
    font-family:inherit;transition:all .15s;
  }
  .seg button.sel{
    color:#1a0a14;background:var(--neon-pink);border-color:var(--neon-pink);
    box-shadow:0 0 12px rgba(255,79,163,.5);font-weight:bold;
  }
  .seg button:active{transform:scale(.96);}

  /* ===== 大ボタン ===== */
  .big-btn{
    display:block;width:100%;padding:20px;font-size:1.3rem;font-weight:bold;
    color:#1a0a14;border:none;border-radius:16px;cursor:pointer;
    background:linear-gradient(135deg,var(--neon-yellow) 0%,var(--neon-orange) 60%,var(--neon-pink) 130%);
    box-shadow:0 0 20px rgba(255,180,60,.45),0 4px 0 #a35a1f;
    font-family:inherit;letter-spacing:.06em;margin:6px 0 14px;
    transition:transform .08s;
  }
  .big-btn:active{transform:translateY(3px);box-shadow:0 0 20px rgba(255,180,60,.45),0 1px 0 #a35a1f;}
  .sub-btns{display:flex;gap:10px;margin-top:12px;}
  .sub-btn{
    flex:1;padding:14px 8px;font-size:1rem;font-weight:bold;
    background:var(--card2);color:var(--neon-cyan);
    border:2px solid var(--neon-cyan);border-radius:12px;cursor:pointer;
    font-family:inherit;transition:all .15s;
  }
  .sub-btn.pink{color:var(--neon-pink);border-color:var(--neon-pink);}
  .sub-btn:active{transform:scale(.96);}

  /* ===== 出力 ===== */
  .output{
    background:var(--bg2);border:2px dashed var(--border);border-radius:14px;
    padding:18px 16px;min-height:90px;white-space:pre-wrap;
    line-height:1.9;font-size:1.02rem;
  }
  .output.empty{color:var(--muted);text-align:center;display:flex;align-items:center;justify-content:center;}
  .output.pop{animation:pop .35s;}
  @keyframes pop{0%{transform:scale(.96);opacity:.4;}60%{transform:scale(1.015);}100%{transform:scale(1);opacity:1;}}

  .gag-text{font-size:1.25rem;font-weight:bold;color:var(--neon-yellow);line-height:1.7;margin-bottom:12px;}
  .gag-meta{font-size:.92rem;line-height:1.8;}
  .gag-meta .tag{color:var(--neon-cyan);font-weight:bold;}
  .risk{color:var(--neon-pink);letter-spacing:.15em;font-size:1.05rem;}
  .risk .off{color:#5a3355;}

  .recovery-box{
    margin-top:12px;background:var(--card2);border:1px solid var(--border);
    border-radius:12px;padding:14px;font-size:1.05rem;line-height:1.8;
    display:none;
  }
  .recovery-box.show{display:block;animation:pop .3s;}
  .recovery-box .rc-label{font-size:.8rem;color:var(--neon-cyan);font-weight:bold;display:block;margin-bottom:4px;}

  /* ===== スライダー ===== */
  .slider-row{display:flex;align-items:center;gap:10px;}
  .slider-row span{font-size:.8rem;color:var(--muted);white-space:nowrap;}
  input[type=range]{
    flex:1;height:34px;appearance:none;background:transparent;cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{
    height:10px;border-radius:5px;
    background:linear-gradient(90deg,var(--neon-cyan),var(--neon-yellow),var(--neon-pink));
  }
  input[type=range]::-webkit-slider-thumb{
    appearance:none;width:30px;height:30px;border-radius:50%;
    background:var(--text);border:3px solid var(--neon-pink);
    margin-top:-10px;box-shadow:0 0 10px rgba(255,79,163,.7);
  }
  input[type=range]::-moz-range-track{
    height:10px;border-radius:5px;
    background:linear-gradient(90deg,var(--neon-cyan),var(--neon-yellow),var(--neon-pink));
  }
  input[type=range]::-moz-range-thumb{
    width:30px;height:30px;border-radius:50%;
    background:var(--text);border:3px solid var(--neon-pink);
  }
  .ikioi-label{text-align:center;font-size:.95rem;color:var(--neon-yellow);font-weight:bold;margin-top:4px;min-height:1.4em;}

  /* ===== 絵文字演出 ===== */
  .fx{position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:99;}
  .fx span{
    position:absolute;font-size:2rem;
    animation:jump 1.1s ease-out forwards;
  }
  @keyframes jump{
    0%{transform:translateY(0) scale(.5) rotate(0deg);opacity:0;}
    15%{opacity:1;}
    60%{transform:translateY(-38vh) scale(1.3) rotate(20deg);opacity:1;}
    100%{transform:translateY(-15vh) scale(1) rotate(-15deg);opacity:0;}
  }
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
    background:var(--neon-yellow);color:#1a0a14;font-weight:bold;
    padding:12px 22px;border-radius:999px;font-size:.95rem;
    box-shadow:0 0 18px rgba(255,217,59,.6);opacity:0;transition:opacity .3s;
    pointer-events:none;z-index:100;
  }
  .toast.show{opacity:1;}
  .checkline{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .checkline input{width:22px;height:22px;accent-color:var(--neon-pink);}
  .checkline label{font-size:.92rem;color:var(--muted);}
  footer{text-align:center;color:#7a4d6b;font-size:.75rem;margin-top:30px;}
</style>
</head>

<script>
"use strict";
/* ============================================================
   共通ユーティリティ
============================================================ */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pick2(arr){ // 重複しない2つ
  if(arr.length<2) return [arr[0],arr[0]];
  var i=Math.floor(Math.random()*arr.length), j=i;
  while(j===i) j=Math.floor(Math.random()*arr.length);
  return [arr[i],arr[j]];
}
function segValue(id){
  var b=document.querySelector('#'+id+' button.sel');
  return b?b.dataset.v:null;
}
document.querySelectorAll('.seg').forEach(function(seg){
  seg.addEventListener('click',function(e){
    var btn=e.target.closest('button'); if(!btn) return;
    seg.querySelectorAll('button').forEach(function(b){b.classList.remove('sel');});
    btn.classList.add('sel');
  });
});
function switchTab(t){
  document.getElementById('tabKanpai').classList.toggle('active',t==='kanpai');
  document.getElementById('tabGag').classList.toggle('active',t==='gag');
  document.getElementById('panelKanpai').classList.toggle('active',t==='kanpai');
  document.getElementById('panelGag').classList.toggle('active',t==='gag');
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm);
  t._tm=setTimeout(function(){t.classList.remove('show');},1600);
}
function burst(emojis){
  var fx=document.getElementById('fx');
  for(var i=0;i<10;i++){
    (function(i){
      setTimeout(function(){
        var s=document.createElement('span');
        s.textContent=pick(emojis);
        s.style.left=(5+Math.random()*85)+'%';
        s.style.top=(60+Math.random()*30)+'%';
        s.style.fontSize=(1.4+Math.random()*1.4)+'rem';
        fx.appendChild(s);
        setTimeout(function(){s.remove();},1200);
      }, i*60);
    })(i);
  }
}
function copyText(outId, kind){
  var el=document.getElementById(outId);
  var txt = kind==='gag' ? (el.dataset.copy||'') : el.textContent;
  if(!txt || el.classList.contains('empty')){ toast('まず生成してね！'); return; }
  function ok(){ toast('コピーしました！🍻'); }
  function fallback(){
    var ta=document.createElement('textarea');
    ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); ok(); }catch(e){ toast('コピーできませんでした…'); }
    ta.remove();
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok, fallback);
  }else{ fallback(); }
}

var KANPAI_LINE = "それでは皆様、ご唱和ください。乾杯！";

function genSpeech(){
  var scene = SCENES[document.getElementById('scene').value];
  var role = segValue('roleSeg');
  var len = segValue('lenSeg');
  var name = document.getElementById('heroName').value.trim() || scene.hero;
  function N(s){ return s.split('{name}').join(name); }

  var parts=[];
  var opener = pick(ROLE_OPENERS[role]);
  var closeLead = N(pick(scene.close));

  if(len==='short'){
    parts.push(opener);
    parts.push(closeLead + KANPAI_LINE);
  }else if(len==='normal'){
    parts.push(opener);
    parts.push(N(pick(scene.intro)));
    parts.push(N(pick(scene.body)));
    parts.push(closeLead + KANPAI_LINE);
  }else{
    var bodies = pick2(scene.body);
    parts.push(opener);
    parts.push(N(pick(scene.intro)));
    parts.push(N(bodies[0]));
    parts.push(pick(ROLE_FLAVORS[role]));
    parts.push(N(pick(scene.body2)));
    parts.push(closeLead + KANPAI_LINE);
  }

  var out=document.getElementById('speechOut');
  out.classList.remove('empty');
  out.textContent = parts.join('\n\n');
  out.classList.remove('pop'); void out.offsetWidth; out.classList.add('pop');
  burst(['🍻','🍺','🥂','✨','🏮']);
}

  {t:"夢は大きく、態度は小さく、声はもっと大きく！はい！", tip:"最後の「はい！」で敬礼。体育会系の勢いで押し切る。", risk:3, cats:["intro"]},
  {t:"（グラスを見つめて）……この泡に、俺の今週が詰まってる。", tip:"急に詩人になる。3秒の沈黙を作ってから言うのがコツ。", risk:4, cats:["sudden"]},
  {t:"レモンサワー頼んだ人、正直に手を挙げて。……私です。自首しました。", tip:"手を挙げるまでの間が命。誰も挙げなくても気にしない。", risk:4, cats:["sudden"]},

  {t:"焼き鳥の串、集めると強くなれる気がして捨てられません。剣士なので。", tip:"串を1本構えてキメ顔。店のルールには従うこと。", risk:3, cats:["sudden"]},
  {t:"お化けは出んでも、電話は出んわ。あ、これさっきのと繋がった！", tip:"伏線回収風に自分で驚く。セット運用で笑いの複利を狙う。", risk:5, cats:["sudden"]},

  {t:"おにぎりの具は、鮭。なぜなら、話が咲け（さけ）るから。", tip:"うんちく口調で始めて着地でズラす。米好きに刺さる。", risk:4, cats:["sudden","kids"]},
  {t:"ペンギンって、ペンでも銀でもないのにペンギンって、すぎない？", tip:"哲学風に問いかける。返事は待たずに次の話題へ。", risk:5, cats:["sudden","kids"]},
  {t:"「もう帰るの？」「うん、カエルだけに。」（帰らない）", tip:"帰るフリからの着席。行動とセットの体で覚えるネタ。", risk:3, cats:["sudden"]},
  // --- リカバリー芸（スベった後に重ねる用）---

  {t:"はい、今の笑い、後日郵送で受け付けます。切手は不要です。", tip:"事務的な口調で。ポケットからメモを出す動きを添えると強い。", risk:3, cats:["recovery"]},
  {t:"今のは前フリです。本ネタは来年の忘年会で。", tip:"長期予告でその場を切り抜ける。手帳に書くフリをする。", risk:2, cats:["recovery"]},
  {t:"おかしいな…家では大爆笑だったのに。（家族は無観客）", tip:"遠い目で言う。無観客のくだりは小声で。", risk:2, cats:["recovery"]},
  {t:"今の静けさ、録音して睡眠用BGMにします。", tip:"スマホを掲げて録音のフリ。静寂を財産に変える錬金術。", risk:3, cats:["recovery"]},
  {t:"皆さん、今のは笑うところでした。次は合図出しますね。せーの、で。", tip:"講師のような口調で。実際に練習させ始めると大きい笑いに。", risk:3, cats:["recovery"]},
  {t:"すみません、ギャグの賞味期限が切れてました。返品してきます。", tip:"レシートを探すフリをする。小道具ゼロでできる良ネタ。", risk:2, cats:["recovery"]}
];

var RECOVERY = [
  "今のは時空の歪みのせいです。",
  "会場の湿度が笑いに適していませんでした。",
  "おかしいな、リハーサルでは会場が揺れたのに。",
  "今の、心のシャッターチャンスでしたよ。撮りました？",
  "静けさも、ごちそうです。ごちそうさまでした。",
  "皆さんの笑いのハードル、富士山級ですね。登山届を出してきます。",
  "あ、今、地球の自転が一瞬止まりましたね。",
  "大丈夫です。一番傷ついているのは私です。",
  "今の風、感じました？スベった時だけ吹く風です。涼しい。",
  "私の笑いは後からじわじわ来るタイプです。効き目は明日の朝。",
  "本日のツッコミ担当、欠席のようです。代打を募集します。",
  "今のは練習です。本番は…ありません。",
  "笑いのWi-Fi、ちょっと電波が悪かったみたいです。再接続します。",
  "ご安心ください、これは芸ではなく現象です。"
];

// --- ダジャレ自動生成モード ---
var DAJARE_PRE = ["発表します。","皆さんご存知でした？","ここでニュースです。","聞いてください。","昨日気づいたんですが、","緊急速報です。","私の研究によると、"];
var DAJARE_CORE = [
  ["トナカイ","そんなの、俺に聞くなよ。答えは「と、なかい（仲居）さん」が知ってます"],
  ["コタツ","入った人から出られない。まさに「小（こ）」さな「罠（たつ）」"],
  ["ドーナツ","真ん中が無いのに満たされる。どうなつ（どうなってる）んでしょう"],
  ["メロン","メロンは食べるとメロメロん、なります"],
  ["チーズ","チーズの地図は、チーズ（地図）です"],
  ["カレンダー","カレンダーは、彼（かれ）んだーと思ったら、私のでした"],
  ["ハンコ","ハンコを押すのに、はんこう（反抗）してはいけません"],
  ["ミカン","未完のミカン、実がありません"],
  ["サボテン","サボテンは、サボってんのに育ちます"],

  ["ストロー","ストローで吸うと、疲れがすっと、ロー（低）くなります"]
];
var DAJARE_POST = ["…はい。","以上、現場からでした。","ここテストに出ます。","異論は認めます。","拍手はご自由に。","なんちゃって。","（ドヤ顔）"];

function stars(n){
  var s='';
  for(var i=1;i<=5;i++) s += i<=n ? '★' : '<span class="off">★</span>';
  return s;
}
var IKIOI_LABELS = {
  1:"🍃 控えめ・小声でぼそっと",
  2:"🙂 ぼちぼち・様子見",
  3:"🔥🔥🔥 ほどほど参戦",
  4:"💪 かなり本気モード",
  5:"🚀 全力！恥は明日の思い出！"
};
function updateIkioi(){
  var v = document.getElementById('ikioi').value;
  document.getElementById('ikioiLabel').textContent = IKIOI_LABELS[v];
}

var lastGag = null;
function genGag(){
  var out=document.getElementById('gagOut');
  var ikioi = parseInt(document.getElementById('ikioi').value,10);

  if(document.getElementById('autoMode').checked){
    var core = pick(DAJARE_CORE);
    var text = pick(DAJARE_PRE) + core[0] + "。" + core[1] + "。" + pick(DAJARE_POST);
    render(text, "機械が今つくりました。責任の所在も機械です。堂々と読み上げてください。", Math.min(5, ikioi+1), "🤖 自動生成ダジャレ");
    return;
  }

  var sit = segValue('sitSeg');
  var pool = GAGS.filter(function(g){ return g.cats.indexOf(sit)>=0; });
  // 勢いに近いリスクのネタを優先（±1以内を優先プール）
  var near = pool.filter(function(g){ return Math.abs(g.risk-ikioi)<=1; });
  var usePool = near.length>=2 ? near : pool;
  var g = pick(usePool);
  if(usePool.length>1){ var guard=0; while(g===lastGag && guard++<10) g=pick(usePool); }
  lastGag=g;
  render(g.t, g.tip, g.risk, null);

  function render(text, tip, risk, badge){
    out.classList.remove('empty');
    out.innerHTML =
      (badge?'<div style="font-size:.8rem;color:var(--neon-cyan);margin-bottom:6px;">'+badge+'</div>':'') +
      '<div class="gag-text">'+esc(text)+'</div>' +
      '<div class="gag-meta">' +
        '<span class="tag">💡 実行時のコツ:</span> '+esc(tip)+'<br>' +
        '<span class="tag">⚠️ スベり度リスク:</span> <span class="risk">'+stars(risk)+'</span>' +
      '</div>';
    out.dataset.copy = text + "\n💡コツ: " + tip + "\n⚠️スベり度: " + "★".repeat(risk) + "☆".repeat(5-risk);
    out.classList.remove('pop'); void out.offsetWidth; out.classList.add('pop');
    burst(['🎤','😂','✨','💥','🏮']);
  }
}
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
var lastRec = null;
function genRecovery(){
  var r = pick(RECOVERY);
  var guard=0; while(r===lastRec && guard++<10) r=pick(RECOVERY);
  lastRec=r;
  var box=document.getElementById('recoveryBox');
  document.getElementById('recoveryText').textContent = "「" + r + "」";
  box.classList.remove('show'); void box.offsetWidth; box.classList.add('show');
  burst(['🧯','💦','🌀','😇']);
}
updateIkioi();
</script>
